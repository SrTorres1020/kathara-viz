name: KatharaViz CI Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint-python:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r bridge/requirements.txt
        
    - name: Run Black formatting check
      run: python -m black --check bridge/
      
    - name: Run Flake8 linter
      run: python -m flake8 bridge/ --config bridge/.flake8

  lint-javascript:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "20.x"
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run ESLint
      run: npm run lint

  test-python-bridge:
    needs: lint-python
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        
    - name: Install Bridge dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r bridge/requirements.txt
        
    - name: Run Pytest
      run: |
        cd bridge
        python -m pytest tests/

  test-frontend-core:
    needs: lint-javascript
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "20.x"
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run Jest tests
      run: npm test
