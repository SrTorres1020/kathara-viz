# Complex Network: Multi-router topology with 3 subnets
# Topology: LAN_A -- R1 -- WAN -- R2 -- LAN_B

# Router 1: connects LAN_A and WAN
r1[0]="LAN_A"
r1[1]="WAN"
r1[image]="kathara/frr"

# Router 2: connects WAN and LAN_B
r2[0]="WAN"
r2[1]="LAN_B"
r2[image]="kathara/frr"

# Switch on LAN_A
sw1[0]="LAN_A"

# Hosts on LAN_A
pc1[0]="LAN_A"
pc1[bridged]="true"
pc2[0]="LAN_A"

# Hosts on LAN_B
pc3[0]="LAN_B"
pc4[0]="LAN_B"

# Server on LAN_B
server[0]="LAN_B"
